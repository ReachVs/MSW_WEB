name: msw

x-backend: &backend
  build:
    context: ..
    dockerfile: docker/php/Dockerfile
  image: msw-backend:latest
  environment:
    APP_URL: "http://localhost:${BACKEND_HTTP_PORT:-8080}"
    DB_CONNECTION: mysql
    DB_HOST: mysql
    DB_PORT: 3306
    DB_DATABASE: laravel
    DB_USERNAME: laravel
    DB_PASSWORD: password
    CACHE_STORE: file
    QUEUE_CONNECTION: sync
    SESSION_DRIVER: file
    MAIL_MAILER: log
    SANCTUM_STATEFUL_DOMAINS: "localhost:${FRONTEND_HTTP_PORT:-5173},127.0.0.1:${FRONTEND_HTTP_PORT:-5173}"
    SESSION_DOMAIN: localhost
    CORS_ALLOWED_ORIGINS: "http://localhost:${FRONTEND_HTTP_PORT:-5173},http://127.0.0.1:${FRONTEND_HTTP_PORT:-5173}"
  volumes:
    - ../backend:/var/www/html
    - backend-vendor:/var/www/html/vendor
    - backend-storage:/var/www/html/storage
    - backend-cache:/var/www/html/bootstrap/cache
  depends_on:
    mysql:
      condition: service_healthy

services:
  backend:
    <<: *backend
    command: php artisan serve --host=0.0.0.0 --port=8000
    ports:
      - "${BACKEND_HTTP_PORT:-8080}:8000"
    environment:
      APP_URL: "http://localhost:${BACKEND_HTTP_PORT:-8080}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: laravel
      DB_PASSWORD: password
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: file
      MAIL_MAILER: log
      RUN_MIGRATIONS: "true"
      RUN_SEEDERS: "true"
      SANCTUM_STATEFUL_DOMAINS: "localhost:${FRONTEND_HTTP_PORT:-5173},127.0.0.1:${FRONTEND_HTTP_PORT:-5173}"
      SESSION_DOMAIN: localhost
      CORS_ALLOWED_ORIGINS: "http://localhost:${FRONTEND_HTTP_PORT:-5173},http://127.0.0.1:${FRONTEND_HTTP_PORT:-5173}"
    healthcheck:
      test: ["CMD-SHELL", "php artisan migrate:status --no-interaction >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  frontend:
    build:
      context: ..
      dockerfile: docker/node/Dockerfile
    image: msw-frontend:latest
    environment:
      VITE_API_URL: "http://localhost:${BACKEND_HTTP_PORT:-8080}"
    ports:
      - "${FRONTEND_HTTP_PORT:-5173}:5173"
    volumes:
      - ../frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - backend

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: password
    ports:
      - "${MYSQL_FORWARD_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  backend-cache:
  backend-storage:
  backend-vendor:
  frontend-node-modules:
  mysql-data:
