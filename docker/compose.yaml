name: msw

x-backend: &backend
  build:
    context: ..
    dockerfile: docker/php/Dockerfile
  image: msw-backend:latest
  env_file:
    - ../backend/.env
  environment:
    APP_URL: "http://localhost:${BACKEND_HTTP_PORT:-8080}"
    DB_CONNECTION: mysql
    DB_HOST: mysql
    DB_PORT: 3306
    DB_DATABASE: laravel
    DB_USERNAME: laravel
    DB_PASSWORD: password
    CACHE_STORE: redis
    QUEUE_CONNECTION: redis
    SESSION_DRIVER: redis
    REDIS_HOST: redis
    MAIL_MAILER: smtp
    MAIL_HOST: mailpit
    MAIL_PORT: 1025
    SANCTUM_STATEFUL_DOMAINS: "localhost:${FRONTEND_HTTP_PORT:-5173},127.0.0.1:${FRONTEND_HTTP_PORT:-5173}"
    SESSION_DOMAIN: localhost
    CORS_ALLOWED_ORIGINS: "http://localhost:${FRONTEND_HTTP_PORT:-5173},http://127.0.0.1:${FRONTEND_HTTP_PORT:-5173}"
  volumes:
    - ../backend:/var/www/html
    - backend-vendor:/var/www/html/vendor
    - backend-storage:/var/www/html/storage
    - backend-cache:/var/www/html/bootstrap/cache
  depends_on:
    mysql:
      condition: service_healthy
    redis:
      condition: service_healthy
    mailpit:
      condition: service_started

services:
  backend:
    <<: *backend
    environment:
      APP_URL: "http://localhost:${BACKEND_HTTP_PORT:-8080}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: laravel
      DB_PASSWORD: password
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      RUN_MIGRATIONS: "true"
      RUN_SEEDERS: "true"
      SANCTUM_STATEFUL_DOMAINS: "localhost:${FRONTEND_HTTP_PORT:-5173},127.0.0.1:${FRONTEND_HTTP_PORT:-5173}"
      SESSION_DOMAIN: localhost
      CORS_ALLOWED_ORIGINS: "http://localhost:${FRONTEND_HTTP_PORT:-5173},http://127.0.0.1:${FRONTEND_HTTP_PORT:-5173}"
    healthcheck:
      test: ["CMD-SHELL", "php artisan migrate:status --no-interaction >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  queue:
    <<: *backend
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=90
    depends_on:
      backend:
        condition: service_healthy

  scheduler:
    <<: *backend
    command: php artisan schedule:work
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "${BACKEND_HTTP_PORT:-8080}:80"
    volumes:
      - ../backend/public:/var/www/html/public:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  frontend:
    build:
      context: ..
      dockerfile: docker/node/Dockerfile
    image: msw-frontend:latest
    environment:
      VITE_API_URL: "http://localhost:${BACKEND_HTTP_PORT:-8080}"
    ports:
      - "${FRONTEND_HTTP_PORT:-5173}:5173"
    volumes:
      - ../frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - nginx

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: password
    ports:
      - "${MYSQL_FORWARD_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8-alpine
    ports:
      - "${REDIS_FORWARD_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_DASHBOARD_PORT:-8025}:8025"

volumes:
  backend-cache:
  backend-storage:
  backend-vendor:
  frontend-node-modules:
  mysql-data:
  redis-data:
